<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NKUST ROV TEAM | 官方網站</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* 基礎設定 */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
            /* ！！！這就是你要的光暈魔法 ！！！ */
            /* 用 radial-gradient 做出從上方中心發出微光的聚光燈效果 */
            background: radial-gradient(circle at 50% 15%, #2a4a6b 0%, #0a192f 45%, #040914 100%);
            
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden; 
        }
        a {
            text-decoration: none;
            color: inherit;
        }

        /* 頂部導覽列 (Navbar) */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: rgba(10, 25, 47, 0.85); /* 稍微調透明一點，透出背景光暈 */
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .nav-logo img {
            height: 40px;
            width: 40px;
            border-radius: 50%;
            border: 2px solid #ffffff; 
        }
        .nav-links {
            display: flex;
            gap: 30px;
        }
        .nav-links a {
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }
        .nav-links a:hover {
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255,255,255,0.5);
        }

        /* 主視覺橫幅 (Hero Section) */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* 橫幅這裡就不放背景圖了，直接讓 body 的光暈透出來！ */
            background-color: transparent; 
            padding: 0 20px;
            margin-top: 50px; /* 稍微往下推，避開導覽列 */
        }
        .hero h1 {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        .hero p {
            font-size: 1.2rem;
            color: #8892b0;
            max-width: 600px;
            margin-bottom: 30px;
        }
        .btn-primary {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 5px;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        .btn-primary:hover {
            background-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        /* 內容區塊共用設定 */
        .section {
            padding: 80px 10%;
        }
        .section-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 40px;
            color: #ccd6f6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .section-title::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background-color: #ffffff;
            margin: 15px auto 0;
        }

        /* 3D 堆疊輪播圖樣式 */
        .carousel-container {
            position: relative;
            max-width: 1000px;
            height: 450px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }
        .carousel-item {
            position: absolute;
            width: 60%;
            height: 400px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            transition: transform 0.6s ease-in-out, opacity 0.6s ease-in-out, z-index 0.6s;
            opacity: 0; 
            z-index: 1;
        }
        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2); 
        }

        /* 紀錄片影片區塊樣式 */
        .video-wrapper {
            max-width: 900px;
            margin: 0 auto;
            border-radius: 15px;
            overflow: hidden; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            background-color: #000;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* 合作夥伴區塊 */
        .sponsors-frame {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 15px;
            padding: 40px;
            backdrop-filter: blur(5px);
            max-width: 900px;
            margin: 0 auto;
        }
        .sponsor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 30px;
        }
        .sponsor-item {
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }
        .sponsor-item:hover {
            transform: scale(1.1);
        }
        .sponsor-item img {
            max-width: 100%;
            height: auto;
            max-height: 50px;
            object-fit: contain;
            filter: grayscale(100%) brightness(200%);
            transition: all 0.3s ease;
        }
        .sponsor-item:hover img {
            filter: grayscale(0%) brightness(100%);
        }

        /* 頁尾 */
        .footer {
            background-color: rgba(2, 12, 27, 0.8);
            padding: 40px 10%;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .footer-social {
            margin-bottom: 20px;
        }
        .footer-social a {
            color: #8892b0;
            font-size: 1.5rem;
            margin: 0 10px;
            transition: color 0.3s ease;
        }
        .footer-social a:hover {
            color: #ffffff;
        }
        .footer-text {
            color: #8892b0;
            font-size: 0.85rem;
        }

        /* 手機版適應 */
        @media (max-width: 768px) {
            .navbar { padding: 15px 20px; }
            .nav-links { display: none; }
            .hero h1 { font-size: 2.2rem; }
            .section { padding: 50px 20px; }
            .carousel-container { height: 300px; }
            .carousel-item { height: 250px; width: 75%; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">
            <img src="https://via.placeholder.com/150/0a192f/ffffff?text=ROV" alt="Logo">
            <span>NKUST ROV TEAM</span>
        </div>
        <div class="nav-links">
            <a href="#gallery">團隊紀錄</a>
            <a href="#video">影音紀錄</a> 
            <a href="#sponsors">合作夥伴</a>
            <a href="#" target="_blank">招募資訊</a>
        </div>
    </nav>

    <header class="hero">
        <h1>NKUST ROV TEAM</h1>
        <p>National Kaohsiung University of Science and Technology<br>致力於水下載具的創新研發與系統整合</p>
        <a href="#video" class="btn-primary">觀賞年度紀錄片</a>
    </header>

    <section id="gallery" class="section">
        <h2 class="section-title">團隊活動紀錄</h2>
        <div class="carousel-container" id="carouselContainer">
            <div class="carousel-item"><img src="https://via.placeholder.com/900x500/112240/ffffff?text=Photo+1" alt="活動照片 1"></div>
            <div class="carousel-item"><img src="https://via.placeholder.com/900x500/1e3a5f/ffffff?text=Photo+2" alt="活動照片 2"></div>
            <div class="carousel-item"><img src="https://via.placeholder.com/900x500/2a5280/ffffff?text=Photo+3" alt="活動照片 3"></div>
            <div class="carousel-item"><img src="https://via.placeholder.com/900x500/386a9e/ffffff?text=Photo+4" alt="活動照片 4"></div>
            <div class="carousel-item"><img src="https://via.placeholder.com/900x500/4982bc/ffffff?text=Photo+5" alt="活動照片 5"></div>
        </div>
    </section>

    <section id="video" class="section">
        <h2 class="section-title">年度紀錄片</h2>
        <div class="video-wrapper">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="NKUST ROV TEAM 紀錄片" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </div>
    </section>

    <section id="sponsors" class="section">
        <h2 class="section-title">Partners & Sponsors</h2>
        <div class="sponsors-frame">
            <div class="sponsor-grid">
                <a href="#" target="_blank" class="sponsor-item"><img src="https://via.placeholder.com/200x80/112240/ffffff?text=Logo+1" alt="高瞻科技不分系"></a>
                <a href="#" target="_blank" class="sponsor-item"><img src="https://via.placeholder.com/200x80/112240/ffffff?text=Logo+2" alt="TORI"></a>
                <a href="#" target="_blank" class="sponsor-item"><img src="https://via.placeholder.com/200x80/112240/ffffff?text=Logo+3" alt="贊助商 3"></a>
                <a href="#" target="_blank" class="sponsor-item"><img src="https://via.placeholder.com/200x80/112240/ffffff?text=Logo+4" alt="贊助商 4"></a>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-social">
            <a href="#" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" target="_blank"><i class="fa-brands fa-youtube"></i></a>
            <a href="#" target="_blank"><i class="fa-brands fa-facebook"></i></a>
        </div>
        <div class="footer-text">
            &copy; 2026 NKUST ROV TEAM. All rights reserved.<br>
            National Kaohsiung University of Science and Technology
        </div>
    </footer>

    <script>
        const items = document.querySelectorAll('.carousel-item');
        let currentIndex = 0;

        function updateCarousel() {
            const totalItems = items.length;
            
            items.forEach((item, index) => {
                item.style.transform = 'translateX(0) scale(0.6)';
                item.style.opacity = '0';
                item.style.zIndex = '1';

                if (index === currentIndex) {
                    item.style.transform = 'translateX(0) scale(1)';
                    item.style.opacity = '1';
                    item.style.zIndex = '3';
                } else if (index === (currentIndex - 1 + totalItems) % totalItems) {
                    item.style.transform = 'translateX(-55%) scale(0.85)';
                    item.style.opacity = '0.6';
                    item.style.zIndex = '2';
                } else if (index === (currentIndex + 1) % totalItems) {
                    item.style.transform = 'translateX(55%) scale(0.85)';
                    item.style.opacity = '0.6';
                    item.style.zIndex = '2';
                }
            });
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % items.length;
            updateCarousel();
        }

        updateCarousel();
        setInterval(nextSlide, 3000);
    </script>

</body>
</html>
